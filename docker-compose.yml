version: '3.8'

services:
  autonode:
    build: .
    image: autonode:latest
    volumes:
      - ~/.autonode:/root/.autonode
      - ./workflows:/workspace/workflows
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

  autonode-webhook:
    build: .
    image: autonode:latest
    command: ["webhook", "start", "--port", "3000"]
    ports:
      - "3000:3000"
    volumes:
      - ~/.autonode:/root/.autonode
      - ./workflows:/workspace/workflows
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
