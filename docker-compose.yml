version: '3.8'

services:
  taskpipe:
    build: .
    image: taskpipe:latest
    volumes:
      - ~/.taskpipe:/root/.taskpipe
      - ./workflows:/workspace/workflows
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

  taskpipe-webhook:
    build: .
    image: taskpipe:latest
    command: ["webhook", "start", "--port", "3000"]
    ports:
      - "3000:3000"
    volumes:
      - ~/.taskpipe:/root/.taskpipe
      - ./workflows:/workspace/workflows
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
